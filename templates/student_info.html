<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Info — AcadPredict</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
    <span class="brand-nav">🎓 AcadPredict</span>
    <div>
      <a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a>
      <a href="{{ url_for('logout') }}" class="nav-link">Logout</a>
    </div>
  </nav>
  <main class="container">
    <div class="page-header">
      <h2>➕ Add New Student</h2>
      <p>Fill in the student's basic details</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <div class="form-card">
      <form method="POST">
        <div class="form-grid">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="e.g. Aryan Sharma" required>
          </div>
          <div class="form-group">
            <label>Enrollment Number</label>
            <input type="text" name="enrollment_number" placeholder="e.g. 2023CS001" required>
          </div>
          <div class="form-group">
            <label>College Year</label>
            <select name="college_year" required>
              <option value="">-- Select Year --</option>
              <option value="1">1st Year (FY)</option>
              <option value="2">2nd Year (SY)</option>
              <option value="3">3rd Year (TY)</option>
              <option value="4">4th Year (Final)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" placeholder="e.g. 19" min="15" max="35" required>
          </div>
          <div class="form-group full-width">
            <label>Attendance Percentage (%)</label>
            <input type="number" name="attendance_percentage"
                   placeholder="e.g. 85" min="0" max="100" step="0.1" required>
            <small>⚠️ Minimum 75% required to be eligible for exams</small>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Next: Enter Marks →</button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
